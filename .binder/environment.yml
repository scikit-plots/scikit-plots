# .binder/environment.yml
#
# Authors: The scikit-plots developers
# SPDX-License-Identifier: BSD-3-Clause
---
name: scikit-plots-binder

channels:
  - conda-forge   # CPU-generic builds
  - defaults

dependencies:
  # ── Python runtime ──────────────────────────────────────────────────
  - python=3.13
  # - r-base=4.3.2
  # - r-tidyverse

  # ── Build toolchain for source compilation of scikit-plots ──────────
  # If Requires C++11; C++14 needed for multithreaded build.
  - gxx_linux-64>=12   # GCC C++ compiler
  - gcc_linux-64>=12

  # ── Notebook runtime ─────────────────────────────────────────────────
  - notebook
  - jupyterlab
  - jupyterhub
  - jupyter_contrib_nbextensions
  - ipywidgets

  # ── Core scientific stack (conda-forge: CPU-generic) ─────────────────
  # - numpy>=1.24
  # - scipy>=1.11
  # - pandas>=2.0
  # - matplotlib>=3.7
  # - seaborn>=0.13

  # ── pip-installed packages ───────────────────────────────────────────
  # requirements.txt is the single source of truth for all pip packages.
  # It defines global pip flags (--no-cache-dir, --find-links, --pre) and
  # the full package list, including scikit-plots (resolved via --find-links
  # to the staging index).  A single pip block ensures those global flags
  # apply uniformly to every package and avoids duplicate index config.
  - pip
  - pip:
    - -r ../requirements/build.txt
    - -r requirements.txt
  # - pip:
  #   - --no-cache-dir
  #   # Install scikit-plots from the nightly staging index.
  #   # --no-binary ensures source compilation on this node.
  #   - --index-url https://pypi.anaconda.org/scikit-plots-wheels-staging-nightly/simple
  #   - --extra-index-url https://pypi.org/simple
  #   # - --no-binary scikit-plots
  #   - scikit-plots
