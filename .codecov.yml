# https://docs.codecov.com/docs/adding-the-codecov-token
# https://docs.codecov.com/docs/codecovyml-reference
# https://docs.codecov.com/docs/commit-status#project-status
#
# https://docs.codecov.com/docs/codecov-yaml#frequently-asked-questions
# Can I name the file .codecov.yml?
# Yes, you can name the file codecov.yml or .codecov.yml. However,
# the file must still be located in the repository root, dev/, or
# .github/ directories
# cat .codecov.yml | curl --data-binary @- https://codecov.io/validate
#
---

# https://docs.codecov.com/docs/codecovyml-reference#codecov
codecov:
  # max_report_age can be listed in hours '#h' (hours) or '#d' (days)
  # unquoted — matches Codecov canonical form
  # Disabled: this CI build legitimately runs for ~3 hours (Cython build +
  # heavy ML deps). Any finite max_report_age is a liability. Set to 'off'
  # to disable the age check entirely.
  # Ref: https://docs.codecov.com/docs/codecovyml-reference#codecovmax_report_age
  max_report_age: off  # 71h # off, '12h' equates to 12 hours
  # The user that you will use to serve as the bot connection to Codecov
  # This bot user must have permissions on the repo and Codecov (by logging in)
  # bot: <bot-username> #this is a username for Github/Gitlab/Bitbucket
  # archive:
  #   # How to disable archiving - In your codecov.yml, set the following line to false as follows:
  #   uploads: false
  require_ci_to_pass: false
  notify:
    # notification blocks. See: https://docs.codecov.io/docs/codecovyml-reference#section-coverage-notify
    # Prevent coverage status to upload multiple times for parallel and long
    # running CI pipelines. This configuration is particularly useful on PRs
    # to avoid confusion. Note that this value is set to the number of Azure
    # Pipeline jobs uploading coverage reports.
    after_n_builds: 1  # 7
    wait_for_ci: true
    # FIXED: was true — manual_trigger: true tells Codecov to NOT auto-process
    # notifications, requiring a manual trigger in the UI. This is incorrect
    # for automated CI and compounds age-check failures on long-running builds.
    manual_trigger: false

# https://docs.codecov.com/docs/codecovyml-reference#comment
# https://docs.codecov.com/docs/pull-request-comments
# comment:  # this is a top-level key
#   layout: " diff, flags, files"
#   behavior: default
#   require_changes: false        # learn more in the Requiring Changes section below
#   require_base: false           # [true :: must have a base report to post]
#   require_head: true            # [true :: must have a head report to post]
#   hide_project_coverage: false  # [true :: only show coverage on the git diff]
comment: false  # Disable comment
# slack_app: true

# https://docs.codecov.com/docs/coverage-configuration
# https://docs.codecov.com/docs/codecovyml-reference#coverage
coverage:
  # https://docs.codecov.com/docs/codecovyml-reference#coveragestatus
  status:
    # changes: false
    # default_rules:
    #   flag_coverage_not_uploaded_behavior: include
    # https://docs.codecov.com/docs/commit-status#patch-status
    patch:
      default:
        # basic
        # Be tolerant on slight code coverage diff on PRs to limit
        # noisy red coverage status on github PRs.
        # Note: The coverage stats are still uploaded
        # to codecov so that PR reviewers can see uncovered lines
        target: auto
        threshold: 1%
        # base: auto
        # advanced
        # branches:
        #   - master
        # if_ci_failed: error #success, failure, error, ignore
        if_ci_failed: ignore   # cancelled job is not a coverage failure
        # only_pulls: false
        # flags:
        #   - "unit"
        # paths:
        #   - "src"
      # library:
      #   target: 50%
      #   if_no_uploads: error
      #   if_not_found: success
      #   if_ci_failed: error
      #   paths:
      #     - '!lib/.*/tests/.*'
      # tests:
      #   target: auto
      #   if_no_uploads: error
      #   if_not_found: success
      #   if_ci_failed: error
      #   paths:
      #     - 'lib/.*/tests/.*'
    # https://docs.codecov.com/docs/commit-status#project-status
    project:
      default:  # default is the status check's name, not default settings
        # Commits pushed to main should not make the overall
        # project coverage decrease by more than 1%:
        # basic settings
        # https://docs.codecov.com/docs/common-recipe-list#set-status-checks-to-block-coverage
        # target: 80%    # the required coverage value
        target: auto  # auto compares coverage to the previous base commit
        # adjust accordingly based on how flaky your tests are
        # this allows a 1% drop from the previous base commit coverage
        threshold: 1%  # the leniency in hitting the target
        # base: auto
        # flags:
        #   - unit
        # paths:
        #   - "src"
        # advanced settings
        # branches:
        #   - master
        # if_ci_failed: error #success, failure, error, ignore
        if_ci_failed: ignore   # cancelled job is not a coverage failure
        # informational: false
        # only_pulls: false

# https://docs.codecov.com/docs/codecovyml-reference#ignore
# https://docs.codecov.com/docs/ignoring-paths
ignore:
  # - "path/to/folder"  # ignore folders and all its contents
  # - "test_*.rb"       # wildcards accepted
  # - "**/*.py"         # glob accepted
  - "**/conftest.py"
  - "scikitplot/_build_utils"
  - "scikitplot/_min_dependencies.py"
  - "scikitplot/ml_package_versions.py"
  - "scikitplot/cexperimental"

  # cexternals: ignore only private (_*) parts, not the whole package
  - "scikitplot/cexternals/_*"  # → matches any directory starting with _
  - "scikitplot/cexternals/_*/**/*"  # → recursively ignore everything inside those directories

  - "scikitplot/experimental"

  # Ignore everything in externals
  - "scikitplot/externals/**"  # ❌ closed everything
  # ✅ Re-include step-by-step (IMPORTANT)
  # - "!scikitplot/externals/_sphinx_ext"  # ✅ reopen level 1
  # - "!scikitplot/externals/_sphinx_ext/**"  # ✅ allow traversal
  # - "!scikitplot/externals/_sphinx_ext/_sphinx_ai_assistant"  # ✅ final includes
  # - "!scikitplot/externals/_sphinx_ext/_sphinx_ai_assistant/**"
