# .github/workflows/ci_env_pipenv.yml
#
# PURPOSE
# -------
# Generate and commit fresh Pipenv lock files into the repository so that
# Docker images and developer environments can reproduce exact dependency
# versions without running a network-dependent solve at build time.
#
# The Pipfile and Pipfile.lock are always built from scratch using the
# project's canonical requirements files — no pre-existing Pipfile is read
# or inherited.  This guarantees a clean, deterministic resolution every run.
#
# REQUIREMENTS SOURCES
# --------------------
# requirements/default.txt   → runtime (non-dev) packages  [pipenv install]
# requirements/all.txt       → developer / CI packages      [pipenv install --dev]
# Both files may use -r/-c includes; all includes are resolved recursively and
# validated before being handed to pipenv.
#
# VALIDATION
# ----------
# A pre-flight Python step (5b) flattens every -r/-c include chain into two
# single-file representations and validates each resolved line.  Any invalid
# PEP 508 specifier (e.g. bare globs such as "toml*") causes an immediate,
# attributed error — with file name and line number — before any pipenv command
# runs.
#
# OUTPUT LAYOUT
# -------------
# docker/env_pipenv/              ← root store (updated when UPDATE_ROOT_PIPENV=true)
# │   Pipfile
# │   Pipfile.lock
# │   README.md                  ← untouched
# └── py311/                     ← versioned store (always updated)
#         Pipfile
#         Pipfile.lock
#
# GENERATION STRATEGY
# -------------------
# Work is performed directly inside the versioned directory
# (docker/env_pipenv/<pyXXX>/) — no staging or copy is required:
#
#   1. mkdir -p  <versioned-dir>
#   2. rm -f     Pipfile  Pipfile.lock  (clean slate; ignore if absent)
#   3. export PIPENV_PIPFILE=<abs-path>/Pipfile  ← prevents parent-dir discovery
#   4. pipenv --python <version>        (writes fresh Pipfile at pinned path)
#   5. pipenv install    -r <flat-runtime.txt>
#   6. pipenv install --dev -r <flat-dev.txt>
#                                       (rewrites Pipfile + writes Pipfile.lock)
#   7. rm -rf .venv  /tmp/pipenv_flat/  (transient artefacts; never committed)
#
# If UPDATE_ROOT_PIPENV=true the two generated files are then copied to the
# root store (docker/env_pipenv/) — only Pipfile and Pipfile.lock are touched.
#
# IDEMPOTENCY
# -----------
# A commit is created ONLY when git detects actual file changes.
# The commit message contains "[skip ci]" to prevent recursive triggers.
#
# CONCURRENCY
# -----------
# One run per branch at a time; newer runs cancel older in-progress ones.
#
# SECURITY
# --------
# • contents:write scoped to the single job that needs it (least privilege).
# • All third-party action SHAs are pinned to an immutable commit hash.
# • No secrets are printed; GITHUB_TOKEN usage is implicit via git push.
# • Workflow only executes on the canonical repository, never on forks.
# • github.ref_name is passed through an env var (never inline) to prevent
#   shell-injection from attacker-controlled branch names.
---
name: CI Env Pipenv


# ─── Triggers ────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      update_root_pipenv:
        description: >-
          Also copy the new Pipfile + Pipfile.lock to the root
          docker/env_pipenv/ directory (in addition to the versioned sub-dir).
        required: false
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      py_version:
        description: 'Python version to resolve dependencies against'
        required: false
        type: choice
        default: '3.11'
        options:
          - '3.11'   # ← default; maps to docker/env_pipenv/py311/
          - '3.12'   #            maps to docker/env_pipenv/py312/
          - '3.13'   #            maps to docker/env_pipenv/py313/
          - '3.13t'  #            maps to docker/env_pipenv/py313t/  (free-threaded)
  # push:
  #   branches:
  #     - main
  #     - maintenance/**
  schedule:
    # cron: "11 11 * * SUN,WED"  # Runs every Sunday and Wednesday at 11:11 UTC
    - cron: '11 11 * * 1'


# ─── Concurrency ─────────────────────────────────────────────────────────────
# One run per branch / tag at a time.
# On PRs:  github.head_ref  (source branch name, e.g. "feature/x")
# On push: github.ref       (full ref,            e.g. "refs/heads/main")
# Fallback: github.run_id   (unique per run — never cancels anything)
concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.head_ref || github.ref || github.run_id
    }}
  cancel-in-progress: true


# ─── Default permissions (deny-by-default; job overrides below) ──────────────
permissions:
  contents: read


# ─── Jobs ────────────────────────────────────────────────────────────────────
jobs:

  update_pipenv:
    # ── Identity ───────────────────────────────────────────────────────────────
    name: >-
      Update Pipenv Artifacts
      (py${{ inputs.py_version || '3.11' }},
       root=${{ inputs.update_root_pipenv || 'true' }})
    runs-on: ubuntu-latest

    # Guard: only run on the canonical repo, never on forks.
    if: github.repository == 'scikit-plots/scikit-plots'

    # Elevate write permission at job scope only (principle of least privilege).
    permissions:
      contents: write

    # ── Environment variables ─────────────────────────────────────────────────
    env:
      # Resolve inputs; fall back to sensible defaults for push/schedule triggers.
      # workflow_dispatch inputs are empty strings on non-dispatch triggers.
      PY_VERSION:         ${{ inputs.py_version         || '3.11' }}
      UPDATE_ROOT_PIPENV: ${{ inputs.update_root_pipenv || 'true' }}

      # Canonical paths inside the repo.
      PIPENV_STORE_DIR: docker/env_pipenv   # root store (relative to GITHUB_WORKSPACE)
      REQUIREMENTS_DIR: requirements        # where *.txt requirement files live

      # ── Pipenv behaviour knobs ──────────────────────────────────────────────
      # Keep the virtualenv inside the versioned directory for clean isolation.
      # The .venv folder is removed after lock generation and is never committed.
      PIPENV_VENV_IN_PROJECT: '1'
      # Prevent pipenv from activating any outer / inherited virtualenv.
      PIPENV_IGNORE_VIRTUALENVS: '1'
      # Suppress the "courtesy notice" banner (CI noise reduction).
      PIPENV_VERBOSITY: '-1'
      # NOTE: PIPENV_PIPFILE is set dynamically in step 5 (after VERSIONED_DIR
      # is known from step 2) so it cannot be declared here at the job level.

    # ── Steps ─────────────────────────────────────────────────────────────────
    steps:

      # ── Step 1: Checkout ────────────────────────────────────────────────────
      # persist-credentials: true  — needed so `git push` in step 11 works.
      # fetch-depth: 0             — full history for correct git operations.
      # lfs: true                  — pull any LFS-tracked assets.
      - name: "⬇️ Checkout repository (full history)"
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
          lfs: true
          # On a PR event use the source-branch HEAD commit; otherwise use the
          # triggering ref (branch / tag / schedule SHA).
          ref: ${{ github.event.pull_request.head.sha || github.ref }}


      # ── Step 2: Derive directory names from Python version ──────────────────
      # Transform the dotted version string into a compact directory name:
      #   3.11  → py311
      #   3.13t → py313t   (free-threaded variant; dots removed, suffix kept)
      # All derived values are written to GITHUB_ENV so subsequent steps can
      # consume them as ${{ env.* }} expressions or as plain $VAR shell refs.
      - name: "🔧 Derive PY_DIR and VERSIONED_DIR"
        shell: bash
        run: |
          set -euo pipefail

          # Remove all dots from the version string, then prepend "py".
          PY_DIR="py$(echo "${PY_VERSION}" | tr -d '.')"
          VERSIONED_DIR="${PIPENV_STORE_DIR}/${PY_DIR}"

          echo "PY_DIR=${PY_DIR}"               >> "$GITHUB_ENV"
          echo "VERSIONED_DIR=${VERSIONED_DIR}" >> "$GITHUB_ENV"

          echo "Python version  : ${PY_VERSION}"
          echo "Directory name  : ${PY_DIR}"
          echo "Versioned path  : ${VERSIONED_DIR}"


      # ── Step 3: Set up Python ────────────────────────────────────────────────
      # actions/setup-python understands the '3.13t' free-threaded specifier.
      - name: "🐍 Set up Python ${{ env.PY_VERSION }}"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ env.PY_VERSION }}


      # ── Step 4: Install pipenv ───────────────────────────────────────────────
      # Upgrade pip first so pipenv resolves against the latest pip resolver.
      - name: "📦 Install pipenv"
        shell: bash
        run: |
          set -euo pipefail
          python --version        # confirm the correct interpreter is active
          python -m pip install --upgrade pip pipenv
          pipenv --version


      # ── Step 5: Validate requirements and prepare clean workspace ────────────
      #
      # FAIL-FAST VALIDATION
      # Both top-level requirements files must exist before any pipenv command
      # runs.  Missing files produce an immediate, descriptive error.
      #
      # CLEAN SLATE
      # Any pre-existing Pipfile, Pipfile.lock, or .venv inside VERSIONED_DIR
      # are removed so the lock solve is always independent of prior state.
      # mkdir -p ensures the directory exists even on a first run.
      #
      # PIPENV_PIPFILE  (critical fix — prevents parent-dir Pipfile discovery)
      # Root cause: pipenv walks UP the directory tree looking for a Pipfile.
      # When docker/env_pipenv/Pipfile (the root store) already exists, pipenv
      # finds it before reaching py311/ and uses the WRONG project root.
      # This results in:
      #   • The venv landing in docker/env_pipenv/.venv (not py311/.venv)
      #   • The root Pipfile being overwritten instead of py311/Pipfile
      # Fix: export PIPENV_PIPFILE to an absolute path inside py311/. This
      # completely disables the directory-walk heuristic for this run.
      #
      # FLAT_DIR
      # A temporary directory for the flattened requirements files produced by
      # step 5b. Isolated per run via GITHUB_RUN_ID to prevent conflicts when
      # multiple runs share the same runner (uncommon but possible).
      - name: "🧹 Validate requirements files and clean workspace"
        shell: bash
        run: |
          set -euo pipefail

          REQ_RUNTIME="${GITHUB_WORKSPACE}/${REQUIREMENTS_DIR}/default.txt"
          REQ_DEV="${GITHUB_WORKSPACE}/${REQUIREMENTS_DIR}/all.txt"

          # ── Validate top-level requirements files exist ─────────────────────
          MISSING=0
          for req_file in "${REQ_RUNTIME}" "${REQ_DEV}"; do
            if [[ ! -f "${req_file}" ]]; then
              echo "❌ ERROR: Required file not found: ${req_file}" >&2
              MISSING=1
            else
              echo "✅ Found: ${req_file}"
            fi
          done

          if [[ "${MISSING}" -ne 0 ]]; then
            echo "" >&2
            echo "Ensure both files exist under ${REQUIREMENTS_DIR}/:" >&2
            echo "  default.txt  (runtime dependencies)" >&2
            echo "  all.txt      (dev / CI dependencies)" >&2
            exit 1
          fi

          # ── Expose resolved absolute paths to subsequent steps ──────────────
          echo "REQ_RUNTIME=${REQ_RUNTIME}" >> "$GITHUB_ENV"
          echo "REQ_DEV=${REQ_DEV}"         >> "$GITHUB_ENV"

          # ── Pin PIPENV_PIPFILE to the versioned directory ───────────────────
          # Must be an absolute path so pipenv does not search parent dirs.
          ABS_VERSIONED_DIR="${GITHUB_WORKSPACE}/${VERSIONED_DIR}"
          echo "ABS_VERSIONED_DIR=${ABS_VERSIONED_DIR}"             >> "$GITHUB_ENV"
          echo "PIPENV_PIPFILE=${ABS_VERSIONED_DIR}/Pipfile"        >> "$GITHUB_ENV"

          # ── Temporary directory for flattened requirements ───────────────────
          FLAT_DIR="/tmp/pipenv_flat_${GITHUB_RUN_ID}"
          mkdir -p "${FLAT_DIR}"
          echo "FLAT_DIR=${FLAT_DIR}" >> "$GITHUB_ENV"

          # ── Clean slate inside the versioned directory ──────────────────────
          mkdir -p "${ABS_VERSIONED_DIR}"
          rm -f  "${ABS_VERSIONED_DIR}/Pipfile"
          rm -f  "${ABS_VERSIONED_DIR}/Pipfile.lock"
          rm -rf "${ABS_VERSIONED_DIR}/.venv"

          echo ""
          echo "Workspace prepared : ${ABS_VERSIONED_DIR}/"
          echo "PIPENV_PIPFILE     : ${ABS_VERSIONED_DIR}/Pipfile"
          echo "Flat reqs dir      : ${FLAT_DIR}/"
          ls -lah "${ABS_VERSIONED_DIR}/" || echo "(directory is now empty)"


      # ── Step 5b: Flatten and validate requirements files ────────────────────
      #
      # WHY FLATTEN
      # Pipenv processes -r includes by copying them into a temporary
      # constraints file at a runner-controlled path.  Relative paths in
      # nested -r directives (e.g. default.txt → -r legacy.txt) are resolved
      # from that temp path, not from the original file's directory, which
      # causes "file not found" failures for any multi-level include tree.
      # Flattening collapses the entire include graph into two single files
      # with all paths already resolved — no runtime path logic is needed.
      #
      # WHY FILTER ENVIRONMENT MARKERS
      # Pipenv's internal constraint-file generator does not correctly handle
      # PEP 508 environment markers that evaluate to False for the target
      # Python version.  Instead of omitting the package, it writes an invalid
      # glob specifier (e.g. "toml*") into its temporary constraints file.
      # pip then rejects this specifier with:
      #
      #   ERROR: Invalid requirement: 'toml*': Expected semicolon …
      #
      # This is the root cause of the pipenv lock failures observed on
      # Python 3.11 for packages declared with:
      #
      #   tomli;python_version<"3.11"
      #   toml;python_version<"3.11"
      #   importlib-metadata;python_version<"3.10"
      #
      # Pre-filtering removes every such line before pipenv runs, so the
      # resolver never encounters the invalid constraint.
      #
      # WHY VALIDATE
      # Invalid PEP 508 specifiers (e.g. bare globs such as "toml*") that
      # appear directly in a source requirements file would cause a late,
      # cryptic resolver failure deep inside pipenv.  Pre-validation surfaces
      # the exact file, line number, and offending specifier BEFORE pipenv
      # runs, giving a clear, actionable error.
      #
      # IMPLEMENTATION
      # The helper script .github/scripts/flatten_reqs.py handles all three
      # concerns.  It is a standalone Python file (not an inline heredoc) to
      # avoid the YAML literal-block-scalar indentation constraint: Python
      # module-level code starts at column 1, which falls below the 10-space
      # indentation required by the surrounding run: | block, causing the YAML
      # parser to exit the block scalar early and fail with:
      #
      #   while scanning a simple key … could not find expected ':'
      #
      # Keeping the script as a repo file also makes it independently testable
      # and reviewable outside of CI.
      - name: "📋 Flatten and validate requirements files"
        shell: bash
        run: |
          set -euo pipefail

          python3 "${GITHUB_WORKSPACE}/.github/scripts/flatten_reqs.py" \
            "${REQ_RUNTIME}" \
            "${REQ_DEV}" \
            "${FLAT_DIR}/runtime.txt" \
            "${FLAT_DIR}/dev.txt" \
            "${PY_VERSION}"

          # Expose the flat file paths to step 6.
          echo "REQ_RUNTIME_FLAT=${FLAT_DIR}/runtime.txt" >> "$GITHUB_ENV"
          echo "REQ_DEV_FLAT=${FLAT_DIR}/dev.txt"         >> "$GITHUB_ENV"

          echo ""
          echo "── Flattened runtime requirements ─────────────────────────────"
          cat "${FLAT_DIR}/runtime.txt"
          echo ""
          echo "── Flattened dev requirements ─────────────────────────────────"
          cat "${FLAT_DIR}/dev.txt"


      # ── Step 6: Generate Pipfile and Pipfile.lock from scratch ───────────────
      #
      # PIPENV_PIPFILE (exported to GITHUB_ENV in step 5, picked up automatically
      # by all subsequent steps) pins the exact absolute Pipfile path.
      # Without this, pipenv walks up from docker/env_pipenv/py311/ and finds
      # docker/env_pipenv/Pipfile (the root store), producing the wrong venv
      # location and overwriting the wrong Pipfile.
      #
      # Flat requirement files (from step 5b) have all -r/-c includes already
      # resolved and all lines pre-validated — no path ambiguity exists for
      # pipenv's internal resolver.
      #
      # Command sequence:
      #   pipenv --python <version>
      #       Creates a fresh Pipfile at PIPENV_PIPFILE, pinned to the requested
      #       Python version.  The clean-slate wipe in step 5 guarantees no
      #       prior Pipfile influences the new one.
      #
      #   pipenv install -r <flat-runtime.txt>
      #       Adds each package as a non-dev [packages] entry in Pipfile and
      #       writes an initial Pipfile.lock.
      #
      #   pipenv install --dev -r <flat-dev.txt>
      #       Adds each package as a [dev-packages] entry and rewrites the full
      #       Pipfile.lock with both runtime and dev dependencies resolved.
      - name: "🔒 Generate Pipfile and Pipfile.lock from scratch"
        shell: bash
        working-directory: ${{ env.ABS_VERSIONED_DIR }}
        run: |
          set -euo pipefail

          echo "▶ Working directory    : $(pwd)"
          echo "▶ PIPENV_PIPFILE       : ${PIPENV_PIPFILE}"
          echo "▶ Python version       : ${PY_VERSION}"
          echo "▶ Runtime deps (flat)  : ${REQ_RUNTIME_FLAT}"
          echo "▶ Dev deps (flat)      : ${REQ_DEV_FLAT}"
          echo ""

          # 1. Write a minimal Pipfile pinned to the requested Python version.
          #
          #    ROOT CAUSE FIX: pipenv 2026.6.1 validates PIPENV_PIPFILE at
          #    startup (Project.__init__ → Setting.__init__) and raises
          #    RuntimeError("Given PIPENV_PIPFILE is not found!") when the
          #    path does not yet exist on disk.  The former 'pipenv --python'
          #    call was intended to CREATE the file, but the new guard fires
          #    before any file-creation logic runs.
          #
          #    Fix: write the Pipfile directly with printf before invoking any
          #    pipenv command.  Content is exactly what 'pipenv --python'
          #    produces, keeping semantics identical while bypassing the guard.
          echo "── Write Pipfile for Python ${PY_VERSION} ─────────────────────"
          printf '%s\n' \
            '[[source]]' \
            'url = "https://pypi.org/simple"' \
            'verify_ssl = true' \
            'name = "pypi"' \
            '' \
            '[requires]' \
            "python_version = \"${PY_VERSION}\"" \
            > "${PIPENV_PIPFILE}"
          echo "✅ Pipfile bootstrapped at ${PIPENV_PIPFILE}"
          cat "${PIPENV_PIPFILE}"
          echo ""

          # 2. Import runtime (non-dev) dependencies.
          echo ""
          echo "── pipenv install -r runtime.txt ──────────────────────────────"
          pipenv install -r "${REQ_RUNTIME_FLAT}"

          # 3. Import dev / CI dependencies.
          echo ""
          echo "── pipenv install --dev -r dev.txt ────────────────────────────"
          pipenv install --dev -r "${REQ_DEV_FLAT}"

          echo ""
          echo "✅ Generation complete."
          echo "   Pipfile      : $(wc -l < Pipfile) lines"
          echo "   Pipfile.lock : $(wc -c < Pipfile.lock) bytes"


      # ── Step 7: Verify generated artifacts ──────────────────────────────────
      # Confirms both files exist and are non-empty before any git operations.
      # An empty or absent file indicates a silent pipenv failure that set -e
      # alone may not catch (e.g. pipenv exits 0 but writes no lock).
      - name: "🔍 Verify generated artifacts in versioned directory"
        shell: bash
        run: |
          set -euo pipefail

          FAIL=0
          for artifact in "Pipfile" "Pipfile.lock"; do
            target="${ABS_VERSIONED_DIR}/${artifact}"
            if [[ ! -f "${target}" ]]; then
              echo "❌ ERROR: Missing artifact: ${target}" >&2
              FAIL=1
            elif [[ ! -s "${target}" ]]; then
              echo "❌ ERROR: Artifact is empty: ${target}" >&2
              FAIL=1
            else
              echo "✅ ${target}  ($(wc -c < "${target}") bytes)"
            fi
          done

          if [[ "${FAIL}" -ne 0 ]]; then
            echo "" >&2
            echo "pipenv did not produce the expected output files." >&2
            echo "Check step 6 logs for resolver errors." >&2
            exit 1
          fi

          echo ""
          echo "Versioned directory contents:"
          ls -lh "${ABS_VERSIONED_DIR}/"


      # ── Step 8: Remove transient build artefacts ─────────────────────────────
      # Removes the .venv created during the lock solve and the flat
      # requirements directory produced in step 5b.
      # Both are implementation details — they are not committed and are not
      # needed after Pipfile.lock has been written.
      # if: always() ensures cleanup runs even when an upstream step fails.
      - name: "🧹 Remove .venv and flat requirements artefacts"
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          # Remove the in-project virtualenv.
          # PIPENV_VENV_IN_PROJECT=1 places .venv next to the Pipfile, which is
          # inside ABS_VERSIONED_DIR.
          VENV_PATH="${ABS_VERSIONED_DIR}/.venv"
          if [[ -d "${VENV_PATH}" ]]; then
            rm -rf "${VENV_PATH}"
            echo "Removed: ${VENV_PATH}"
          else
            echo ".venv not present — nothing to remove."
          fi

          # Remove the temporary flat requirements directory.
          if [[ -n "${FLAT_DIR:-}" && -d "${FLAT_DIR}" ]]; then
            rm -rf "${FLAT_DIR}"
            echo "Removed: ${FLAT_DIR}"
          else
            echo "Flat requirements dir not present — nothing to remove."
          fi


      # ── Step 9: Stage artifacts → root store (conditional) ───────────────────
      # Only executed when UPDATE_ROOT_PIPENV is 'true'.
      # Copies only Pipfile and Pipfile.lock from the versioned directory to
      # docker/env_pipenv/ — no other files (README.md, *.zip, …) are touched.
      - name: "📁 Stage artifacts → root store (${{ env.PIPENV_STORE_DIR }})"
        if: env.UPDATE_ROOT_PIPENV == 'true'
        shell: bash
        run: |
          set -euo pipefail

          ROOT_STORE="${GITHUB_WORKSPACE}/${PIPENV_STORE_DIR}"
          mkdir -p "${ROOT_STORE}"

          cp "${ABS_VERSIONED_DIR}/Pipfile"      "${ROOT_STORE}/Pipfile"
          cp "${ABS_VERSIONED_DIR}/Pipfile.lock" "${ROOT_STORE}/Pipfile.lock"

          echo "Staged to: ${ROOT_STORE}/"
          ls -lh "${ROOT_STORE}/Pipfile" "${ROOT_STORE}/Pipfile.lock"


      # ── Step 10: Detect changes (idempotent guard) ────────────────────────────
      # `git diff --quiet` exits 0 (no changes) or 1 (changes detected).
      # We capture this as a job output so steps 11 and 12 can branch on it.
      # This makes the workflow fully idempotent: repeated runs on an already
      # up-to-date repo produce no commits.
      - name: "🔎 Detect changes"
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          # Stage new/modified files for comparison (does not create a commit).
          git add --intent-to-add "${PIPENV_STORE_DIR}/"

          if git diff --quiet HEAD -- "${PIPENV_STORE_DIR}/"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected — lock files are already up to date."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected:"
            git diff --stat HEAD -- "${PIPENV_STORE_DIR}/"
          fi


      # ── Step 11: Commit and push ──────────────────────────────────────────────
      # Only runs when changes were detected in step 10.
      # [skip ci] in the commit message prevents this push from re-triggering
      # the workflow, avoiding an infinite loop.
      # The bot identity (github-actions[bot]) is the canonical CI committer.
      - name: "💾 Commit and push updated Pipenv artifacts"
        if: steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          # Passed through env to prevent shell-injection from attacker-
          # controllable branch names embedded in github.ref_name.
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${PIPENV_STORE_DIR}/"

          # Compose a descriptive, traceable commit message.
          COMMIT_MSG="chore(pipenv): regenerate lock files for Python ${PY_VERSION} [skip ci]

          Triggered by  : ${{ github.event_name }}
          Workflow run  : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Versioned dir : ${VERSIONED_DIR}
          Root updated  : ${UPDATE_ROOT_PIPENV}
          Runtime deps  : ${REQUIREMENTS_DIR}/default.txt
          Dev deps      : ${REQUIREMENTS_DIR}/all.txt"

          git commit -m "${COMMIT_MSG}"

          # Push to the branch that triggered this workflow.
          git push origin "HEAD:${REF_NAME}"
          echo "✅ Pushed updated Pipenv artifacts."


      # ── Step 12: No-op confirmation ───────────────────────────────────────────
      # Provides an explicit, visible confirmation in the Actions log when the
      # workflow runs successfully but has nothing new to commit.
      - name: "✅ Lock files already up to date — nothing to commit"
        if: steps.changes.outputs.changed == 'false'
        shell: bash
        run: |
          echo "Lock files in ${PIPENV_STORE_DIR}/ are already up to date."
          echo "No commit was created. This run is a no-op (idempotent)."
