# ──────────────────────────────────────────────────────────────────────────────
# Workflow : Update Pipenv Artifacts
# File     : .github/workflows/ci_env_pipenv.yml
#
# PURPOSE
# -------
# Regenerate docker/env_pipenv/<pyXYY>/Pipfile and Pipfile.lock from the
# project's requirements/*.txt sources, then open (or update) a Pull Request
# so branch-protection rules and required status checks are honoured.
#
# ROOT-CAUSE FIX (from run 25767498708)
# ──────────────────────────────────────
# The previous workflow committed and pushed directly to `main`:
#
#   git push origin "HEAD:${REF_NAME}"   # REF_NAME = main
#
# GitHub rejected the push because the repository enforces:
#   • Changes must be made through a pull request.
#   • 2 required status checks must pass.
#   • CodeQL scan must complete before merging.
#
# Fix: replace every manual git-commit/push block with
# `peter-evans/create-pull-request@v7`.  That action:
#   • Pushes changes to a dedicated branch (chore/pipenv-lock-update-pyXY).
#   • Opens a PR against the base branch (main) — or updates the existing one.
#   • Is idempotent: re-running the workflow updates the existing PR rather than
#     opening duplicates.
#   • Triggers CI (CodeQL, required checks) on the PR, satisfying protection rules.
#   • Deletes the temporary branch automatically after the PR is merged.
#
# PERMISSIONS REQUIRED
# ────────────────────
# contents: write      — to push the lock-update branch
# pull-requests: write — to open / update the PR
#
# NOTE: PRs created via GITHUB_TOKEN DO trigger required CI checks.
# The only limitation is that workflow files themselves cannot be modified;
# for that a PAT or GitHub App token would be needed (not required here).
# ──────────────────────────────────────────────────────────────────────────────

name: Update Pipenv Artifacts

on:
  workflow_dispatch:
    inputs:
      py_version:
        description: "Python version to target (e.g. 3.11)"
        required: false
        default: "3.11"
      update_root_pipenv:
        description: "Also update the root-level docker/env_pipenv/Pipfile{,.lock}"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  # Optional: keep locks fresh automatically every Monday at 11:11 UTC.
  # Remove or adjust if you prefer manual-only triggers.
  schedule:
    - cron: "11 11 * * 1"

# ── Safety: one lock-update run per Python version at a time ─────────────────
concurrency:
  group: pipenv-update-${{ github.ref_name }}-py${{ inputs.py_version || '3.11' }}
  cancel-in-progress: false   # let an in-progress run finish; queue the next

# ── Minimal token permissions (principle of least privilege) ─────────────────
permissions:
  contents: write        # push the lock-update branch
  pull-requests: write   # open / update the PR

# ──────────────────────────────────────────────────────────────────────────────
jobs:
  update-pipenv:
    name: >-
      Update Pipenv Artifacts
      (py${{ matrix.py_version }}, root=${{ matrix.update_root }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Add additional rows here for other Python versions, e.g.:
          #   - py_version: "3.12"
          #     update_root: false
          - py_version: ${{ inputs.py_version || '3.11' }}
            update_root: ${{ inputs.update_root_pipenv == 'true' || true }}

    # ── Job-level env vars ──────────────────────────────────────────────────
    env:
      PY_VERSION:                ${{ matrix.py_version }}
      UPDATE_ROOT_PIPENV:        ${{ matrix.update_root }}
      PIPENV_STORE_DIR:          docker/env_pipenv
      REQUIREMENTS_DIR:          requirements
      # pipenv behaviour flags — keep verbosity off to reduce log noise
      PIPENV_VENV_IN_PROJECT:    "1"
      PIPENV_IGNORE_VIRTUALENVS: "1"
      PIPENV_VERBOSITY:          "-1"

    # ── Steps ───────────────────────────────────────────────────────────────
    steps:

      # ── 1. Checkout ───────────────────────────────────────────────────────
      ## 📥 Checkout the Git repository into the runner
      - name: "⬇️ Checkout (cloned) repository with full history"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token:        ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false  # Prevents accidental credential exposure
          # submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod
          lfs: true
          ## Gets the correct commit message for pull request
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # ── 2. Derive versioned directory name ────────────────────────────────
      # Converts PY_VERSION ("3.11") → PY_DIR ("py311") and builds the
      # absolute path used by all subsequent steps.
      - name: Derive versioned directory name
        shell: bash
        run: |
          set -Eeuo pipefail

          # Remove dots and prepend "py": 3.11 → py311
          PY_DIR="py$(echo "${PY_VERSION}" | tr -d '.')"
          VERSIONED_DIR="${PIPENV_STORE_DIR}/${PY_DIR}"

          echo "PY_DIR=${PY_DIR}"               >> "$GITHUB_ENV"
          echo "VERSIONED_DIR=${VERSIONED_DIR}" >> "$GITHUB_ENV"

          echo "Python version  : ${PY_VERSION}"
          echo "Directory name  : ${PY_DIR}"
          echo "Versioned path  : ${VERSIONED_DIR}"

      # ── 3. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.py_version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.py_version }}
          check-latest:   false

      # ── 4. Install pip and pipenv ─────────────────────────────────────────
      - name: Install pip and pipenv
        shell: bash
        run: |
          set -Eeuo pipefail
          python --version    # confirm interpreter
          python -m pip install --upgrade pip pipenv
          pipenv --version

      # ── 5. Validate requirements files and prepare workspace ─────────────
      # Fail fast if source files are missing.
      # Bootstraps the versioned directory with a clean slate.
      - name: Validate requirements files and prepare workspace
        shell: bash
        run: |
          set -Eeuo pipefail

          REQ_RUNTIME="${GITHUB_WORKSPACE}/${REQUIREMENTS_DIR}/default.txt"
          REQ_DEV="${GITHUB_WORKSPACE}/${REQUIREMENTS_DIR}/all.txt"

          # ── Validate top-level requirements files exist ──────────────────
          MISSING=0
          for req_file in "${REQ_RUNTIME}" "${REQ_DEV}"; do
            if [[ ! -f "${req_file}" ]]; then
              echo "❌ ERROR: Required file not found: ${req_file}" >&2
              MISSING=1
            else
              echo "✅ Found: ${req_file}"
            fi
          done

          if [[ "${MISSING}" -ne 0 ]]; then
            echo "" >&2
            echo "Ensure both files exist under ${REQUIREMENTS_DIR}/:" >&2
            echo "  default.txt  (runtime dependencies)" >&2
            echo "  all.txt      (dev / CI dependencies)" >&2
            exit 1
          fi

          # ── Expose resolved absolute paths to subsequent steps ───────────
          echo "REQ_RUNTIME=${REQ_RUNTIME}" >> "$GITHUB_ENV"
          echo "REQ_DEV=${REQ_DEV}"         >> "$GITHUB_ENV"

          # ── Pin PIPENV_PIPFILE to the versioned directory ────────────────
          # Must be an absolute path so pipenv does not search parent dirs.
          ABS_VERSIONED_DIR="${GITHUB_WORKSPACE}/${VERSIONED_DIR}"
          echo "ABS_VERSIONED_DIR=${ABS_VERSIONED_DIR}"          >> "$GITHUB_ENV"
          echo "PIPENV_PIPFILE=${ABS_VERSIONED_DIR}/Pipfile"     >> "$GITHUB_ENV"

          # ── Temporary directory for flattened requirements ───────────────
          FLAT_DIR="/tmp/pipenv_flat_${GITHUB_RUN_ID}"
          mkdir -p "${FLAT_DIR}"
          echo "FLAT_DIR=${FLAT_DIR}" >> "$GITHUB_ENV"

          # ── Clean slate inside the versioned directory ───────────────────
          mkdir -p "${ABS_VERSIONED_DIR}"
          rm -f  "${ABS_VERSIONED_DIR}/Pipfile"
          rm -f  "${ABS_VERSIONED_DIR}/Pipfile.lock"
          rm -rf "${ABS_VERSIONED_DIR}/.venv"

          echo ""
          echo "Workspace prepared : ${ABS_VERSIONED_DIR}/"
          echo "PIPENV_PIPFILE     : ${ABS_VERSIONED_DIR}/Pipfile"
          echo "Flat reqs dir      : ${FLAT_DIR}/"
          ls -lah "${ABS_VERSIONED_DIR}/" || echo "(directory is now empty)"

      # ── 6. Flatten requirements for target Python version ─────────────────
      # The helper script evaluates PEP 508 environment markers (python_version,
      # sys_platform) and emits only the lines that apply to PY_VERSION.
      - name: Flatten requirements for Python ${{ matrix.py_version }}
        shell: bash
        run: |
          set -Eeuo pipefail

          python3 "${GITHUB_WORKSPACE}/.github/scripts/flatten_reqs.py" \
            "${REQ_RUNTIME}" \
            "${REQ_DEV}" \
            "${FLAT_DIR}/runtime.txt" \
            "${FLAT_DIR}/dev.txt" \
            "${PY_VERSION}"

          # Expose the flat file paths to subsequent steps.
          echo "REQ_RUNTIME_FLAT=${FLAT_DIR}/runtime.txt" >> "$GITHUB_ENV"
          echo "REQ_DEV_FLAT=${FLAT_DIR}/dev.txt"         >> "$GITHUB_ENV"

          echo ""
          echo "── Flattened runtime requirements ──────────────────────────"
          cat "${FLAT_DIR}/runtime.txt"
          echo ""
          echo "── Flattened dev requirements ──────────────────────────────"
          cat "${FLAT_DIR}/dev.txt"

      # ── 7. Generate Pipfile and Pipfile.lock ──────────────────────────────
      # ROOT-CAUSE NOTE (pipenv 2026.6.1 guard):
      #   pipenv 2026.6.1 validates PIPENV_PIPFILE at startup
      #   (Project.__init__ → Setting.__init__) and raises
      #   RuntimeError("Given PIPENV_PIPFILE is not found!") when the path
      #   does not yet exist on disk. We therefore write the Pipfile manually
      #   with `printf` BEFORE invoking any pipenv command, producing exactly
      #   the same content that `pipenv --python` would have created.
      - name: Generate Pipfile and Pipfile.lock
        working-directory: ${{ env.ABS_VERSIONED_DIR }}
        shell: bash
        run: |
          set -Eeuo pipefail

          echo "▶ Working directory    : $(pwd)"
          echo "▶ PIPENV_PIPFILE       : ${PIPENV_PIPFILE}"
          echo "▶ Python version       : ${PY_VERSION}"
          echo "▶ Runtime deps (flat)  : ${REQ_RUNTIME_FLAT}"
          echo "▶ Dev deps (flat)      : ${REQ_DEV_FLAT}"
          echo ""

          # 1. Bootstrap a minimal Pipfile pinned to the requested Python version.
          echo "── Write Pipfile for Python ${PY_VERSION} ────────────────────"
          printf '%s\n' \
            '[[source]]' \
            'url = "https://pypi.org/simple"' \
            'verify_ssl = true' \
            'name = "pypi"' \
            '' \
            '[requires]' \
            "python_version = \"${PY_VERSION}\"" \
            > "${PIPENV_PIPFILE}"
          echo "✅ Pipfile bootstrapped at ${PIPENV_PIPFILE}"
          cat "${PIPENV_PIPFILE}"
          echo ""

          # 2. Import runtime (non-dev) dependencies.
          echo "── pipenv install -r runtime.txt ───────────────────────────"
          pipenv install -r "${REQ_RUNTIME_FLAT}"

          # 3. Import dev / CI dependencies.
          echo ""
          echo "── pipenv install --dev -r dev.txt ─────────────────────────"
          pipenv install --dev -r "${REQ_DEV_FLAT}"

          echo ""
          echo "✅ Generation complete."
          echo "   Pipfile      : $(wc -l < Pipfile) lines"
          echo "   Pipfile.lock : $(wc -c < Pipfile.lock) bytes"

      # ── 8. Validate generated artifacts ───────────────────────────────────
      # Fail fast — surface resolver errors before any git operations.
      - name: Validate generated artifacts
        shell: bash
        run: |
          set -Eeuo pipefail

          FAIL=0
          for artifact in "Pipfile" "Pipfile.lock"; do
            target="${ABS_VERSIONED_DIR}/${artifact}"
            if [[ ! -f "${target}" ]]; then
              echo "❌ ERROR: Missing artifact: ${target}" >&2
              FAIL=1
            elif [[ ! -s "${target}" ]]; then
              echo "❌ ERROR: Artifact is empty: ${target}" >&2
              FAIL=1
            else
              echo "✅ ${target}  ($(wc -c < "${target}") bytes)"
            fi
          done

          if [[ "${FAIL}" -ne 0 ]]; then
            echo "" >&2
            echo "pipenv did not produce the expected output files." >&2
            echo "Check the generation step logs for resolver errors." >&2
            exit 1
          fi

          echo ""
          echo "Versioned directory contents:"
          ls -lh "${ABS_VERSIONED_DIR}/"

      # ── 9. Remove transient files ─────────────────────────────────────────
      # The in-project .venv and /tmp flat-requirements directory are not
      # committed; remove them before the PR diff is computed.
      - name: Remove transient files (.venv and flat requirements)
        shell: bash
        run: |
          set -Eeuo pipefail

          # Remove the in-project virtualenv (PIPENV_VENV_IN_PROJECT=1).
          VENV_PATH="${ABS_VERSIONED_DIR}/.venv"
          if [[ -d "${VENV_PATH}" ]]; then
            rm -rf "${VENV_PATH}"
            echo "Removed: ${VENV_PATH}"
          else
            echo ".venv not present — nothing to remove."
          fi

          # Remove the temporary flat requirements directory.
          if [[ -n "${FLAT_DIR:-}" && -d "${FLAT_DIR}" ]]; then
            rm -rf "${FLAT_DIR}"
            echo "Removed: ${FLAT_DIR}"
          else
            echo "Flat requirements dir not present — nothing to remove."
          fi

      # ── 10. Copy artifacts to the root store (optional) ───────────────────
      # When UPDATE_ROOT_PIPENV=true the versioned lock files are also written
      # to docker/env_pipenv/Pipfile{,.lock} so Docker builds can reference a
      # single canonical location without knowing the Python sub-directory.
      - name: Stage root-level Pipfile copies
        if: env.UPDATE_ROOT_PIPENV == 'true'
        shell: bash
        run: |
          set -Eeuo pipefail

          ROOT_STORE="${GITHUB_WORKSPACE}/${PIPENV_STORE_DIR}"
          mkdir -p "${ROOT_STORE}"

          cp "${ABS_VERSIONED_DIR}/Pipfile"      "${ROOT_STORE}/Pipfile"
          cp "${ABS_VERSIONED_DIR}/Pipfile.lock" "${ROOT_STORE}/Pipfile.lock"

          echo "Staged to: ${ROOT_STORE}/"
          ls -lh "${ROOT_STORE}/Pipfile" "${ROOT_STORE}/Pipfile.lock"

      # ── 11. Open / update Pull Request ───────────────────────────────────
      #
      # ROOT-CAUSE FIX: replaces the previous `git commit && git push origin
      # HEAD:main` block that was rejected by branch-protection rules.
      #
      # https://github.com/peter-evans/create-pull-request
      # peter-evans/create-pull-request:
      #   • Pushes only changed files to a dedicated branch.
      #   • Is fully IDEMPOTENT: a second run updates the existing open PR
      #     instead of creating a duplicate.
      #   • Triggers all required CI checks (CodeQL, status checks) on the PR.
      #   • Deletes the branch automatically after the PR is merged or closed.
      #   • Skips opening a PR when no files changed (nothing to commit).
      #
      # IMPORTANT: PRs created via GITHUB_TOKEN trigger required workflows on
      # the PR branch, satisfying branch-protection status-check requirements.
      - name: Open or update Pull Request with updated lock files
        id: cpr
        # uses: peter-evans/create-pull-request@v8
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token:         ${{ secrets.GITHUB_TOKEN }}

          # ── Commit message written into the branch ─────────────────────
          commit-message: |
            chore(pipenv): regenerate lock files for Python ${{ matrix.py_version }}

            Triggered by  : ${{ github.event_name }}
            Workflow run  : ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Versioned dir : ${{ env.VERSIONED_DIR }}
            Root updated  : ${{ env.UPDATE_ROOT_PIPENV }}
            Runtime deps  : ${{ env.REQUIREMENTS_DIR }}/default.txt
            Dev deps      : ${{ env.REQUIREMENTS_DIR }}/all.txt

          # committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          # author: ${{ github.actor }} <${{ github.actor_id }}+${{ github.actor }}@users.noreply.github.com>
          # signoff: false

          # ── Branch that receives the lock-file commit ──────────────────
          # Stable, per-Python-version name → idempotent re-runs update
          # the same branch rather than creating a new one each time.
          branch:        chore/pipenv-lock-update-py${{ matrix.py_version }}

          # Clean up the branch after the PR is merged or closed.
          delete-branch: true

          # ── Pull-request metadata ──────────────────────────────────────
          title: "[MAINT] chore(pipenv): regenerate lock files for Python ${{ matrix.py_version }}"

          body: |
            ## Automated Pipenv Lock File Update

            | Field          | Value |
            |----------------|-------|
            | Python version | `${{ matrix.py_version }}` |
            | Versioned dir  | `${{ env.VERSIONED_DIR }}` |
            | Root updated   | `${{ env.UPDATE_ROOT_PIPENV }}` |
            | Runtime deps   | `${{ env.REQUIREMENTS_DIR }}/default.txt` |
            | Dev deps       | `${{ env.REQUIREMENTS_DIR }}/all.txt` |
            | Triggered by   | `${{ github.event_name }}` |
            | Workflow run   | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ### Changed files
            - `${{ env.VERSIONED_DIR }}/Pipfile`
            - `${{ env.VERSIONED_DIR }}/Pipfile.lock`
            - `${{ env.PIPENV_STORE_DIR }}/Pipfile` *(if root update enabled)*
            - `${{ env.PIPENV_STORE_DIR }}/Pipfile.lock` *(if root update enabled)*

            ---
            *This PR was opened automatically by the
            [Update Pipenv Artifacts](${{ github.server_url }}/${{ github.repository }}/actions/workflows/ci_env_pipenv.yml)
            workflow. Review the lock-file diff before merging.*

          labels: |
            dependencies
            automated

          # assignees: peter-evans
          # reviewers: peter-evans
          # team-reviewers: |
          #   developers
          #   qa-team
          # milestone: 1
          # draft: false

          # ── Target branch (must satisfy branch-protection requirements) ──
          base:          ${{ github.ref_name }}

      # ── 12. Log PR outcome ───────────────────────────────────────────────
      - name: Report Pull Request outcome
        if: always()
        shell: bash
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL:    ${{ steps.cpr.outputs.pull-request-url }}
          PR_OP:     ${{ steps.cpr.outputs.pull-request-operation }}
        run: |
          set -Eeuo pipefail
          if [[ -z "${PR_NUMBER:-}" ]]; then
            echo "ℹ️  No PR created — lock files are already up to date."
          else
            echo "✅ PR #${PR_NUMBER} ${PR_OP}: ${PR_URL}"
          fi
