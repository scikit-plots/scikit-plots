# Git Context          Tags Generated (both DockerHub + GHCR)
# Push to main         :<alias>  :<alias2>           e.g. :latest  :latest-python-3.11
# Push to maintenance  :<X.Y.x>-<flavor>             e.g. :0.3.x-python-3.11
# Push tag vX.Y.Z      :<X.Y.Z>-<flavor>             e.g. :0.4.0-python-3.11
# PR / feature branch  build-only, no push           ci-<12-char-sha> (local label)
#
# Pushing images
# You can push a new image to this repository using the CLI:
# docker tag local-image:tagname new-repo:tagname
# docker push new-repo:tagname
# Make sure to replace tagname with your desired image repository tag.
# docker tag <existing_image_name>:<existing_tag> <new_image_name>:<new_tag>
#
# https://hub.docker.com/u/scikitplot
# https://hub.docker.com/r/scikitplot/scikit-plots
# docker login -u scikitplot
# Example:
# scikitplot/<repo>:latest
# docker build -t scikitplot/scikit-plots:latest .
# docker push scikitplot/scikit-plots:latest
# docker build -t scikitplot/scikit-plots:sha-abc1234 .
# docker push scikitplot/scikit-plots:sha-abc1234
# docker build -t scikitplot/scikit-plots:dev .
# docker push scikitplot/scikit-plots:dev
# docker build -t scikitplot/scikit-plots:v1.0.0 .
#
# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry
# https://github.com/docker/login-action?tab=readme-ov-file#docker-hub
# https://github.com/docker/login-action?tab=readme-ov-file#github-container-registry
#
# python - <<'PY'
# import yaml, sys
# yaml.safe_load(open("ci_docker_image.yml","r",encoding="utf-8"))
# print("OK: YAML parses")
# PY
#
# Dry-run the tag logic (no push)
# export GITHUB_EVENT_NAME=pull_request
# export GITHUB_SHA=0123456789abcdef0123456789abcdef01234567
# export REF_TYPE=branch VERSION="" BRANCH=main
# export IMAGE_NAMESPACE=scikitplot IMAGE_REPO=scikit-plots GHCR_ORG=scikit-plots
# export TAG=python-3.11 REF_TAG=ref_tags-python-3.11 ALIAS=latest-python-3.11 ALIAS2=latest
# bash -euxo pipefail -c '...paste the run: | script body here...'
---
name: CI 🐋 Docker Recommended multi-platform flow (QEMU + Buildx + build-push-action)  #  (Auto-Tagging with scikitplot)

# Trigger the workflow on push to any branch or tag
on:
  # push:
  #   branches:
  #     - '**'    # Matches all branches, including main, dev, feature/*
  #     - main
  #     - maintenance/**
  #   tags:
  #     - '*'     # Matches all Git tags (e.g., v1.0.0)
  #     - 'v*.*.*'
  workflow_dispatch:  # Allows manual triggering of the workflow
    inputs:
      free_disk_space:                                  # Specify true/false
        description: 'free_disk_space pkg source'
        required: false                                 # 👈 Optional — workflow runs with the default if omitted
        type: choice                                    # choice type always passes a string to ${{ inputs.* }}
        default: 'false'                                # 👈 quoted string — unquoted 'false' is a YAML boolean
        options:
          - 'true'
          - 'false'                                     # Default


## simultaneity
## This ensures that only one deployment to "production" can happen at a time.
## If a new commit is pushed before the current job finishes, the in-progress job is canceled.
concurrency:
  ## Ensures that only one instance of this workflow runs per branch or PR at a time.
  ## The 'group' key defines a unique concurrency group:
  ## - github.workflow: Name of the workflow file.
  ## - github.head_ref: (Only on pull_request) The name of the branch from which the PR was created (source branch). Example: "feature/add-login"
  ## - github.run_id: (Always) A unique numeric ID for each run of a workflow. Useful as a fallback for uniqueness. Example: 6432789156
  ## - github.ref: (Always) The full ref path of the branch or tag that triggered the workflow. Examples: For a push to a branch: "refs/heads/main" For a PR: "refs/pull/42/merge" For a tag: "refs/tags/v1.0.0"
  ## - github.ref_name: (Always) Just the final part of the ref path (branch or tag name, does not exist for PRs). Examples: For a push to a branch: "main" For a tag: "v1.0.0"
  ## This ensures: PRs use head_ref, Pushes/Tags use ref or ref_name, Fallback to run_id in edge cases
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  ## If you push multiple times quickly, older runs would continue even though newer ones have started.
  ## Canceling previous runs reduces resource usage and speeds up feedback.
  ## If a new run is triggered for the same group, cancel the in-progress one.
  cancel-in-progress: true


## Top-level permissions (outside jobs)
## Job-level permissions (inside a specific job)
## Restrict the permissions granted to the use of secrets.GITHUB_TOKEN in this
## github actions workflow:
## https://docs.github.com/en/actions/security-guides/automatic-token-authentication
##
## Principle of least privilege: grant permissions at job level only, not workflow level.
## This way only the 'docker' job gets packages:write; any other jobs added later get
## the minimal read-only defaults automatically.
##
## GITHUB_TOKEN is auto-provisioned by GitHub for every run — you never define it.
## Its capabilities are controlled entirely by the permissions: block below.
## packages:write is required for any GHCR push (public or private repository).
permissions:
  contents: read  # for actions/checkout to fetch code
  # packages: write  # intentionally NOT granted at workflow level — set per-job below


# https://github.com/jupyterhub/repo2docker-action
# https://github.com/scikit-hep/pyhf/blob/main/.github/workflows/docker.yml
# https://github.com/jupyterhub/binderhub/blob/main/.github/workflows/test-docker-build.yaml
# https://github.com/jupyterhub/binderhub/blob/main/helm-chart/chartpress.yaml
# https://github.com/jupyterhub/chartpress
jobs:
  docker:
    runs-on: ubuntu-latest  # Use Ubuntu runner for Docker tasks
    permissions:
      contents: read
      packages: write      # required for GHCR push (ghcr.io); uses GITHUB_TOKEN
      # attestations: write  # enable only when actions/attest step is active
      # id-token: write      # enable only when using OIDC (cosign, sigstore, etc.)

    ## https://docs.github.com/en/actions/reference/evaluate-expressions-in-workflows-and-actions
    # if: startsWith-endsWith( matrix.service[0], 'jupyter' ), contains( matrix.service[0], 'python-3.11' )
    # if: contains( matrix.service[0], matrix.tag[0] ) if: contains( matrix.service[0], matrix.tag.tag )  # Optional: Runtime Filtering Instead
    strategy:
      fail-fast: false  # Allow all jobs to run even if one fails
      matrix:
        # Matrix Inputs (multi-line object):
        service:
          # [compose_service_name, dockerhub_org, dockerhub_image]
          - [scikit-plots_latest-python-3.11-slim, scikitplot, scikit-plots]  # install latest release on PyPI
          - [scikit-plots_latest-jupyter, scikitplot, scikit-plots]  # install latest release on PyPI
        # Matrix Inputs (inline object):
        tag: [
          # Branches main maintenance/0.3.x  maintenance/0.3.7
          # [tag_name, optional_tag_only_suffix, alias, ...]
          # [python-3.11, ref_tags-python-3.11, latest-python-3.11],  # if based on service Python 3.11
          # [jupyter, ref_tags-jupyter, latest-jupyter, latest],  # if based on service Jupyter
          # { tag: "python-3.14", ref_tag: "ref_tags-python-3.14", alias: "latest-python-3.14", alias2: "latest" },  # Python-based tags
          { tag: "python-3.11", ref_tag: "ref_tags-python-3.11", alias: "latest", alias2: "latest-python-3.11" },  # Python-based tags
          # { tag: "jupyter", ref_tag: "ref_tags-jupyter", alias: "latest-jupyter" },  # Jupyter-based tags
          { tag: "jupyter", ref_tag: "ref_tags-jupyter", alias: "latest-jupyter", alias2: "latest-jupyter-python-3.12" },  # Jupyter-based tags
        ]
        exclude:
          # (Optional) Don't build Exclusion (multi-line object):
          - service: [scikit-plots_latest-python-3.11-slim, scikitplot, scikit-plots]
            tag:
              tag: "jupyter"
              ref_tag: "ref_tags-jupyter"
              alias: "latest-jupyter"
              alias2: "latest-jupyter-python-3.12"  # <-- This key is **not required to match** unless you include it in `exclude`
          # (Optional) Don't build Exclusion (inline object):
          - service: [scikit-plots_latest-jupyter, scikitplot, scikit-plots]
            tag: {
              tag: "python-3.11",
              ref_tag: "ref_tags-python-3.11",
              alias: "latest",
              alias2: "latest-python-3.11"  # <-- This key is **not required to match** unless you include it in `exclude`
            }

    # Set your DockerHub username as a fixed env var
    # https://github.com/docker/login-action?tab=readme-ov-file#docker-hub
    # https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#github-context
    env:
      # REGISTRY: ghcr.io
      # REPO_NAME: ${{ github.event.repository.name }}  # or in shell: $(basename "$GITHUB_REPOSITORY") full_repo_name: ${{ github.repository }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}  # ${{ github.actor }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}  # ${{ secrets.GITHUB_TOKEN }}
      # PY_VERSION: 3.11
      # SCIKITPLOT_VERSION: 0.4.0.post11  # install latest release on PyPI
      # COMPOSE_FILE: docker/docker-compose.yml

    ## To enable this workflow on a fork, comment out:
    if: github.repository == 'scikit-plots/scikit-plots'

    steps:
      - name: Disk space report
        shell: bash
        run: |
          echo "Memory and swap:"
          sudo free -h
          echo
          sudo swapon --show
          echo
          echo "Available storage:"
          sudo df -h

      ## 📥 Checkout the Git repository into the runner
      - name: "⬇️ Checkout (cloned) repository with full history"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false  # Prevents accidental credential exposure
          # submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod
          lfs: true
          ## Gets the correct commit message for pull request
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: 🔖 Export "branch" or "tag" from Git context
        id: gitref
        shell: bash
        run: |
          set -Eeuo pipefail
          REF_TYPE=""
          VERSION_TAG=""
          BRANCH_TAG=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF_TYPE="tag"
            # Two-step strip is required for idempotent version extraction:
            #   Step 1: remove the fixed refs/tags/ prefix unconditionally.
            #   Step 2: strip an optional leading 'v' (e.g. v1.0.0 → 1.0.0).
            # Single-step '${GITHUB_REF#refs/tags/v}' fails for tags WITHOUT a 'v'
            # prefix — e.g. refs/tags/1.0.0 would remain 'refs/tags/1.0.0' intact.
            VERSION_TAG="${GITHUB_REF#refs/tags/}"  # refs/tags/v1.0.0 → v1.0.0
            VERSION_TAG="${VERSION_TAG#v}"           # v1.0.0 → 1.0.0  (no-op if no v)
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            REF_TYPE="branch"
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            BRANCH_TAG="${BRANCH_NAME//\//-}"  # Replace slashes with dashes
          fi
          # Export "branch" or "tag"
          echo "ref_type=$REF_TYPE" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Prepare Compute Docker build plan (tags, dockerfile, push)
        id: docker_plan
        shell: bash
        env:
          # GHCR: org is the GitHub organisation that owns this repo.
          # github.repository_owner resolves correctly on forks too.
          # No extra secret is needed – GITHUB_TOKEN covers packages:write.
          GHCR_ORG: ${{ github.repository_owner }}
          IMAGE_NAMESPACE: ${{ matrix.service[1] }}  #  ${{ github.repository }}
          IMAGE_REPO: ${{ matrix.service[2] }}
          REF_TYPE: ${{ steps.gitref.outputs.ref_type }}
          VERSION: ${{ steps.gitref.outputs.version_tag }}
          BRANCH: ${{ steps.gitref.outputs.branch_tag }}
          # { tag: "python-3.11", ref_tag: "ref_tags-python-3.11", alias: "latest", alias2: "latest-python-3.11" }
          TAG: ${{ matrix.tag.tag }}
          REF_TAG: ${{ matrix.tag.ref_tag }}
          ALIAS: ${{ matrix.tag.alias }}
          ALIAS2: ${{ matrix.tag.alias2 }}
          # Docker Hub credentials (optional – warn and skip DH tags if absent, GHCR still pushes)
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -Eeuo pipefail

          # ── Registry image names ──────────────────────────────────────────────────
          # DockerHub  : <org>/<repo>:<tag>          e.g. scikitplot/scikit-plots:latest
          # GHCR       : ghcr.io/<org>/<repo>:<tag>  e.g. ghcr.io/scikit-plots/scikit-plots:latest
          # Note: DockerHub org is "scikitplot" (no hyphen); GHCR org is the GitHub
          # organisation name "scikit-plots" (with hyphen) — these intentionally differ.
          DH_IMAGE_NAME="${IMAGE_NAMESPACE}/${IMAGE_REPO}"
          GHCR_IMAGE_NAME="ghcr.io/${GHCR_ORG}/${IMAGE_REPO}"

          # ── Dockerfile selection (determined by image flavour) ────────────────────
          # Select Dockerfile based on image flavor (TAG).
          case "${TAG}" in
            python-3.11) DOCKERFILE_PATH="docker/Dockerfile.python" ;;
            jupyter)     DOCKERFILE_PATH="docker/Dockerfile" ;;
            *)           DOCKERFILE_PATH="docker/Dockerfile.python" ;;
          esac

          # ── Git-ref → FINAL_TAG mapping (deterministic, no heuristics) ───────────
          # Rules:
          #   Git tag  (refs/tags/vX.Y.Z) + ref_tags-* suffix → "<version>-<suffix>"
          #   Branch "main"                                   → alias (e.g. "latest")
          #   Branch "maintenance-X.Y.x"                      → "<X.Y.x>-<tag>"
          #   Everything else (feature branches, PRs, …)      → build-only (no push)
          FINAL_TAG=""
          if [[ "${REF_TYPE}" == "tag" && "${REF_TAG}" == ref_tags-* ]]; then
            SUFFIX="${REF_TAG#ref_tags-}"
            [[ -n "${VERSION}" ]] || { echo "VERSION is empty for tag ref" >&2; exit 2; }
            FINAL_TAG="${VERSION}-${SUFFIX}"
          elif [[ "${BRANCH}" == "main" ]]; then
            [[ -n "${ALIAS}" ]] || { echo "matrix.tag.alias is required on main (TAG=${TAG})" >&2; exit 2; }
            FINAL_TAG="${ALIAS}"
          elif [[ "${BRANCH}" == maintenance-* ]]; then
            BRANCH_VERSION="${BRANCH#maintenance-}"
            [[ -n "${BRANCH_VERSION}" ]] || { echo "Invalid maintenance branch name: ${BRANCH}" >&2; exit 2; }
            FINAL_TAG="${BRANCH_VERSION}-${TAG}"
          else
            echo "No push policy for BRANCH=${BRANCH} REF_TYPE=${REF_TYPE}; build-only." >&2
          fi

          # ── Tag list (newline-delimited for docker/build-push-action) ─────────────
          # docker/build-push-action accepts tags from multiple registries in one list;
          # a single build is produced and pushed to all registries simultaneously.
          TAGS=()

          if [[ -n "${FINAL_TAG}" && "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            # ── DockerHub tags ────────────────────────────────────────────────────
            # DockerHub requires explicit credentials.  Warn and skip (don't hard-fail)
            # so GHCR push still succeeds even when DH secrets are absent (e.g. forks).
            if [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]]; then
              TAGS+=("${DH_IMAGE_NAME}:${FINAL_TAG}")
              [[ -n "${ALIAS2}" ]] && TAGS+=("${DH_IMAGE_NAME}:${ALIAS2}")
            else
              echo "⚠️  DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set; skipping DockerHub tags." >&2
            fi
            # ── GHCR tags ─────────────────────────────────────────────────────────
            # GITHUB_TOKEN is always available (packages:write granted at job level).
            # No credential check needed here.
            TAGS+=("${GHCR_IMAGE_NAME}:${FINAL_TAG}")
            [[ -n "${ALIAS2}" ]] && TAGS+=("${GHCR_IMAGE_NAME}:${ALIAS2}")
          else
            # Build-only (PR / feature branch / no matching policy):
            # Use a deterministic local-only tag — never pushed to any registry.
            TAGS+=("${DH_IMAGE_NAME}:ci-${GITHUB_SHA::12}")
          fi

          # ── Push flag ─────────────────────────────────────────────────────────────
          # True when there are registry-qualified tags to push (GHCR always qualifies
          # when FINAL_TAG is set and it's not a PR; DH is additive when creds exist).
          DO_PUSH="false"
          if [[ -n "${FINAL_TAG}" && "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            DO_PUSH="true"
          fi

          # ── Primary tag for downstream inspect / smoke-test steps ─────────────────
          # Prefer GHCR (no pull-rate limits) when available; fall back to local ci tag.
          if [[ -n "${FINAL_TAG}" && "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            PRIMARY_TAG="${GHCR_IMAGE_NAME}:${FINAL_TAG}"
          else
            PRIMARY_TAG="${DH_IMAGE_NAME}:ci-${GITHUB_SHA::12}"
          fi

          # ── Debug summary ─────────────────────────────────────────────────────────
          echo "Dockerfile : ${DOCKERFILE_PATH}" >&2
          echo "Push       : ${DO_PUSH}" >&2
          echo "Primary tag: ${PRIMARY_TAG}" >&2
          echo "Tags:" >&2
          printf '  - %s\n' "${TAGS[@]}" >&2

          # ── Write step outputs ────────────────────────────────────────────────────
          {
            echo "image_name=${DH_IMAGE_NAME}"
            echo "ghcr_image_name=${GHCR_IMAGE_NAME}"
            echo "primary_tag=${PRIMARY_TAG}"
            echo "dockerfile=${DOCKERFILE_PATH}"
            echo "push=${DO_PUSH}"
            echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      ################################################################
      ## Docker build (multi-arch) — canonical Buildx workflow
      ################################################################
      - name: ⚙️ Set up QEMU (multi-arch emulation for docker buildx)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: 🧱 Set up Docker Buildx (for chartpress multi-arch builds)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Log in to Docker Hub
        # Guard: only attempt login when we will actually push AND credentials are available.
        # GitHub Actions sets env vars to empty string when a secret is absent (e.g. on forks),
        # so 'env.DOCKERHUB_USERNAME != ""' is a safe empty-check that works in if: expressions.
        # Skipping here is safe because docker_plan already omits DH tags when creds are absent.
        if: >-
          steps.docker_plan.outputs.push == 'true' &&
          env.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  # ${{ github.actor }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}  # ${{ secrets.GITHUB_TOKEN }}

      # https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images#publishing-images-to-github-packages
      # https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
      #
      # GHCR authentication rules:
      #   - registry  : always "ghcr.io"
      #   - username  : github.actor (the actor who triggered this run)
      #                 ⚠️  Do NOT use DOCKERHUB_USERNAME here — it will cause a 401.
      #   - password  : secrets.GITHUB_TOKEN (auto-provisioned; packages:write grants push)
      #                 Works on forks too — no additional secrets needed.
      - name: 🔐 Log in to the Container registry (GHCR)
        # Guard: GITHUB_TOKEN is always available but login is only needed when pushing.
        # Skipping on build-only runs avoids unnecessary network calls and potential
        # transient auth failures that would abort an otherwise-valid build.
        if: steps.docker_plan.outputs.push == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io                      # GitHub Container Registry
          username: ${{ github.actor }}          # must be the triggering actor
          password: ${{ secrets.GITHUB_TOKEN }}  # auto-provisioned; no extra secret needed

      # - name: Extract metadata (tags, labels) for Docker
      #   id: meta
      #   uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
      #   with:
      #     images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: 🏗️ (multi-arch) Build and Push Docker image
        id: docker_build_release
        # timeout-minutes: 60
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ steps.docker_plan.outputs.dockerfile }}  # docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.docker_plan.outputs.push }}
          pull: true
          tags: ${{ steps.docker_plan.outputs.tags }}  # ${{ steps.meta.outputs.tags }}
          labels: |  # ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.title=scikit-plots
            org.opencontainers.image.description=scikit-plots ${{ matrix.tag.tag }} Docker image
            org.opencontainers.image.version=${{ matrix.tag.alias }}
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.docker_plan.outputs.created }}
          # Canonical cache backend for GitHub Actions runners, This isolates caches.
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
          # load: true  # is for local daemon usability, not for multi-arch publishing.
          # Disable extra OCI attestations for maximum registry/tool compatibility
          # and stable digest expectations in multi-arch publishing.
          # provenance: false
          # sbom: false

      # - name: Generate artifact attestation
      #   uses: actions/attest@v4
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
      #     subject-digest: ${{ steps.push.outputs.digest }}
      #     push-to-registry: true

      # scikitplot/scikit-plots:sha-${GITHUB_SHA::8} corresponds to the tag, which resolves to the index digest.
      # Index digest  — portable multi-platform reproducibility manifest list (what `docker pull` resolves).
      # Manifest digest — one exact platform reproducibility image; use only when targeting a single architecture (e.g. linux/amd64 on Binder).
      # - name: 🐳 Image index digest
      #   continue-on-error: true
      #   run: |
      #     # For multi-arch builds this is returns the index digest, not per-platform digest.
      #     # For multi-arch this is the manifest list / image index digest, not a single image digest.
      #     echo "Digest: ${{ steps.docker_build_release.outputs.digest }}"

      # steps.docker_plan.outputs.primary_tag points to GHCR when push=true (no pull-rate
      # limits), or to the local ci-<sha> tag for build-only runs.
      # Index digest  — portable multi-platform manifest list (what `docker pull` resolves).
      # Manifest digest — single platform image; use only when targeting one arch (e.g. Binder).
      #
      # NOTE: imagetools inspect queries the REGISTRY — it cannot inspect a local-only image.
      # Build-only runs produce a ci-<sha> tag that is never pushed, so this step must be
      # gated on push==true to avoid a guaranteed failure on PRs and feature branches.
      - name: 🔎 Inspect pushed manifest
        if: steps.docker_plan.outputs.push == 'true'
        continue-on-error: true
        env:
          # Map the output to an env var here
          PRIMARY_TAG: ${{ steps.docker_plan.outputs.primary_tag }}
        run: |
          # Use the shell variable syntax ($PRIMARY_TAG)
          docker buildx imagetools inspect "$PRIMARY_TAG"

      # docker pull ghcr.io/scikit-plots/scikit-plots:latest
      # docker run ... ${{ steps.docker_plan.outputs.primary_tag }}
      # Because GitHub runners are usually amd64, but explicit is safer and deterministic.
      #
      # NOTE: docker/build-push-action with multi-arch does NOT load the image into the
      # local Docker daemon (load: true is incompatible with linux/amd64+linux/arm64).
      # On build-only runs the ci-sha tag is never pushed and doesn't exist locally either,
      # so docker run would fail. Gate on push==true so the runner pulls from GHCR.
      - name: 🧪 Smoke test published image check for curl and git
        if: steps.docker_plan.outputs.push == 'true'
        continue-on-error: true
        env:
          # Map the output to an env var here
          PRIMARY_TAG: ${{ steps.docker_plan.outputs.primary_tag }}
        run: |
          for i in {1..2}; do
            if docker run --rm \
              --platform linux/amd64 \
              --entrypoint /bin/bash \
              "$PRIMARY_TAG" \
              -c "uname -m && command -v curl && command -v git && git --version"; then
              # ends the script successfully.
              exit 0
            fi
            echo "Retrying in 10s... ($i/2)"
            sleep 10
          done
          echo "Smoke test failed after retries."
          # exit 1

      - name: 🧹 Cleanup (optional)
        if: always()
        continue-on-error: true
        run: |
          docker system prune -f
          echo "🔗 DockerHub org  : https://hub.docker.com/u/${{ matrix.service[1] }}"
          echo "🔗 DockerHub image: https://hub.docker.com/r/${{ matrix.service[1] }}/${{ matrix.service[2] }}"
          echo "🔗 GHCR image     : https://ghcr.io/${{ github.repository_owner }}/${{ matrix.service[2] }}"

