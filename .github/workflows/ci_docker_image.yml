# Git Context	Tags Generated
# Push to main       	 :latest, :main, :sha-abc1234, :dev
# Push to dev	         :latest, :dev, :sha-abc1234 (if extended)
# Push to feature/foo	 :latest, :feature-foo, :sha-abc1234
# Push tag v1.0.0	     :latest, :v1.0.0, :sha-abc1234
#
# Pushing images
# You can push a new image to this repository using the CLI:
# docker tag local-image:tagname new-repo:tagname
# docker push new-repo:tagname
# Make sure to replace tagname with your desired image repository tag.
# docker tag <existing_image_name>:<existing_tag> <new_image_name>:<new_tag>
#
# https://hub.docker.com/u/scikitplot
# https://hub.docker.com/r/scikitplot/scikit-plots
# docker login -u scikitplot
# Example:
# scikitplot/<repo>:latest
# docker build -t scikitplot/scikit-plots:latest .
# docker push scikitplot/scikit-plots:latest
# docker build -t scikitplot/scikit-plots:sha-abc1234 .
# docker push scikitplot/scikit-plots:sha-abc1234
# docker build -t scikitplot/scikit-plots:dev .
# docker push scikitplot/scikit-plots:dev
# docker build -t scikitplot/scikit-plots:v1.0.0 .
#
# https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry#authenticating-to-the-container-registry
# https://github.com/docker/login-action?tab=readme-ov-file#docker-hub
# https://github.com/docker/login-action?tab=readme-ov-file#github-container-registry
#
# python - <<'PY'
# import yaml, sys
# yaml.safe_load(open("ci_docker_image.yml","r",encoding="utf-8"))
# print("OK: YAML parses")
# PY
#
# Dry-run the tag logic (no push)
# export GITHUB_EVENT_NAME=pull_request
# export GITHUB_SHA=0123456789abcdef0123456789abcdef01234567
# export REF_TYPE=branch VERSION="" BRANCH=main
# export IMAGE_NAMESPACE=scikitplot IMAGE_REPO=scikit-plots
# export TAG=python-3.11 REF_TAG=ref_tags-python-3.11 ALIAS=latest-python-3.11 ALIAS2=latest
# bash -euxo pipefail -c '...paste the run: | script body here...'
---
name: CI 🐋 Docker Recommended multi-platform flow (QEMU + Buildx + build-push-action)  #  (Auto-Tagging with scikitplot)

# Trigger the workflow on push to any branch or tag
on:
  # push:
  #   branches:
  #     - '**'    # Matches all branches, including main, dev, feature/*
  #     - main
  #     - maintenance/**
  #   tags:
  #     - '*'     # Matches all Git tags (e.g., v1.0.0)
  #     - 'v*.*.*'
  workflow_dispatch:  # Allows manual triggering of the workflow
    inputs:
      free_disk_space:                                  # Specify true/false
        description: 'free_disk_space pkg source'
        required: false                                 # 👈 This makes the input mandatory
        type: choice                                    # choice, boolean,
        default: false                                  # 👈 Default
        options:
          - true
          - false                                       # Default


## simultaneity
## This ensures that only one deployment to "production" can happen at a time.
## If a new commit is pushed before the current job finishes, the in-progress job is canceled.
concurrency:
  ## Ensures that only one instance of this workflow runs per branch or PR at a time.
  ## The 'group' key defines a unique concurrency group:
  ## - github.workflow: Name of the workflow file.
  ## - github.head_ref: (Only on pull_request) The name of the branch from which the PR was created (source branch). Example: "feature/add-login"
  ## - github.run_id: (Always) A unique numeric ID for each run of a workflow. Useful as a fallback for uniqueness. Example: 6432789156
  ## - github.ref: (Always) The full ref path of the branch or tag that triggered the workflow. Examples: For a push to a branch: "refs/heads/main" For a PR: "refs/pull/42/merge" For a tag: "refs/tags/v1.0.0"
  ## - github.ref_name: (Always) Just the final part of the ref path (branch or tag name, does not exist for PRs). Examples: For a push to a branch: "main" For a tag: "v1.0.0"
  ## This ensures: PRs use head_ref, Pushes/Tags use ref or ref_name, Fallback to run_id in edge cases
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref || github.run_id }}
  ## If you push multiple times quickly, older runs would continue even though newer ones have started.
  ## Canceling previous runs reduces resource usage and speeds up feedback.
  ## If a new run is triggered for the same group, cancel the in-progress one.
  cancel-in-progress: true


## Top-level permissions (outside jobs)
## Job-level permissions (inside a specific job)
## Restrict the permissions granted to the use of secrets.GITHUB_TOKEN in this
## github actions workflow:
## https://docs.github.com/en/actions/security-guides/automatic-token-authentication
permissions:
  ## only required for workflows in private repositories
  contents: read  # for actions/checkout to fetch code
  # packages: write  # for docker to push to registry


# https://github.com/jupyterhub/repo2docker-action
# https://github.com/scikit-hep/pyhf/blob/main/.github/workflows/docker.yml
# https://github.com/jupyterhub/binderhub/blob/main/.github/workflows/test-docker-build.yaml
# https://github.com/jupyterhub/binderhub/blob/main/helm-chart/chartpress.yaml
# https://github.com/jupyterhub/chartpress
jobs:
  docker:
    runs-on: ubuntu-latest  # Use Ubuntu runner for Docker tasks
    permissions:
      contents: read
      # packages: write  # for docker to push to registry

    ## https://docs.github.com/en/actions/reference/evaluate-expressions-in-workflows-and-actions
    # if: startsWith-endsWith( matrix.service[0], 'jupyter' ), contains( matrix.service[0], 'python-3.11' )
    # if: contains( matrix.service[0], matrix.tag[0] ) if: contains( matrix.service[0], matrix.tag.tag )  # Optional: Runtime Filtering Instead
    strategy:
      fail-fast: false  # Allow all jobs to run even if one fails
      matrix:
        # Matrix Inputs (multi-line object):
        service:
          # [compose_service_name, dockerhub_org, dockerhub_image]
          - [scikit-plots_latest-python-3.11-slim, scikitplot, scikit-plots]  # install latest release on PyPI
          - [scikit-plots_latest-jupyter, scikitplot, scikit-plots]  # install latest release on PyPI
        # Matrix Inputs (inline object):
        tag: [
          # Branches main maintenance/0.3.x  maintenance/0.3.7
          # [tag_name, optional_tag_only_suffix, alias, ...]
          # [python-3.11, ref_tags-python-3.11, latest-python-3.11],  # if based on service Python 3.11
          # [jupyter, ref_tags-jupyter, latest-jupyter, latest],  # if based on service Jupyter
          # { tag: "python-3.14", ref_tag: "ref_tags-python-3.14", alias: "latest-python-3.14", alias2: "latest" },  # Python-based tags
          { tag: "python-3.11", ref_tag: "ref_tags-python-3.11", alias: "latest", alias2: "latest-python-3.11" },  # Python-based tags
          # { tag: "jupyter", ref_tag: "ref_tags-jupyter", alias: "latest-jupyter" },  # Jupyter-based tags
          { tag: "jupyter", ref_tag: "ref_tags-jupyter", alias: "latest-jupyter", alias2: "latest-jupyter-python-3.12" },  # Jupyter-based tags
        ]
        exclude:
          # (Optional) Don't build Exclusion (multi-line object):
          - service: [scikit-plots_latest-python-3.11-slim, scikitplot, scikit-plots]
            tag:
              tag: "jupyter"
              ref_tag: "ref_tags-jupyter"
              alias: "latest-jupyter"
              alias2: "latest-jupyter-python-3.12"  # <-- This key is **not required to match** unless you include it in `exclude`
          # (Optional) Don't build Exclusion (inline object):
          - service: [scikit-plots_latest-jupyter, scikitplot, scikit-plots]
            tag: {
              tag: "python-3.11",
              ref_tag: "ref_tags-python-3.11",
              alias: "latest",
              alias2: "latest-python-3.11"  # <-- This key is **not required to match** unless you include it in `exclude`
            }

    # Set your DockerHub username as a fixed env var
    # https://github.com/docker/login-action?tab=readme-ov-file#docker-hub
    env:
      # REPO_NAME: ${{ github.event.repository.name }}  # or in shell: $(basename "$GITHUB_REPOSITORY")
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN : ${{ secrets.DOCKERHUB_TOKEN }}
      # PY_VERSION: 3.11
      # SCIKITPLOT_VERSION: 0.4.0.post11  # install latest release on PyPI
      # COMPOSE_FILE: docker/docker-compose.yml

    ## To enable this workflow on a fork, comment out:
    if: github.repository == 'scikit-plots/scikit-plots'

    steps:
      - name: Disk space report
        shell: bash
        run: |
          echo "Memory and swap:"
          sudo free -h
          echo
          sudo swapon --show
          echo
          echo "Available storage:"
          sudo df -h

      ## 📥 Checkout the Git repository into the runner
      - name: "⬇️ Checkout (cloned) repository with full history"
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false  # Prevents accidental credential exposure
          # submodules: true  # Fetch Hugo themes (true OR recursive)
          fetch-depth: 0    # Fetch all history for .GitInfo and .Lastmod
          lfs: true
          ## Gets the correct commit message for pull request
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: 🔖 Export "branch" or "tag" from Git context
        id: gitref
        run: |
          REF_TYPE=""
          VERSION_TAG=""
          BRANCH_TAG=""
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF_TYPE="tag"
            VERSION_TAG="${GITHUB_REF#refs/tags/v}"  # strip leading 'v'
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            REF_TYPE="branch"
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            BRANCH_TAG="${BRANCH_NAME//\//-}"  # Replace slashes with dashes
          fi
          # Export "branch" or "tag"
          echo "ref_type=$REF_TYPE" >> "$GITHUB_OUTPUT"
          echo "version_tag=$VERSION_TAG" >> "$GITHUB_OUTPUT"
          echo "branch_tag=$BRANCH_TAG" >> "$GITHUB_OUTPUT"

      - name: 🏷️ Prepare Compute Docker build plan (tags, dockerfile, push)
        id: docker_plan
        shell: bash
        env:
          IMAGE_NAMESPACE: ${{ matrix.service[1] }}
          IMAGE_REPO: ${{ matrix.service[2] }}
          REF_TYPE: ${{ steps.gitref.outputs.ref_type }}
          VERSION: ${{ steps.gitref.outputs.version_tag }}
          BRANCH: ${{ steps.gitref.outputs.branch_tag }}
          # { tag: "python-3.11", ref_tag: "ref_tags-python-3.11", alias: "latest", alias2: "latest-python-3.11" }
          TAG: ${{ matrix.tag.tag }}
          REF_TAG: ${{ matrix.tag.ref_tag }}
          ALIAS: ${{ matrix.tag.alias }}
          ALIAS2: ${{ matrix.tag.alias2 }}
          # Docker Login
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -Eeuo pipefail
          # "scikitplot/scikit-plots"
          IMAGE_NAME="${IMAGE_NAMESPACE}/${IMAGE_REPO}"
          # Select Dockerfile based on image flavor (TAG).
          case "${TAG}" in
            python-3.11) DOCKERFILE_PATH="docker/Dockerfile.python" ;;
            jupyter)     DOCKERFILE_PATH="docker/Dockerfile" ;;
            *)           DOCKERFILE_PATH="docker/Dockerfile.python" ;;
          esac
          # Map git ref -> FINAL_TAG (push tag) deterministically.
          FINAL_TAG=""
          if [[ "${REF_TYPE}" == "tag" && "${REF_TAG}" == ref_tags-* ]]; then
            SUFFIX="${REF_TAG#ref_tags-}"
            [[ -n "${VERSION}" ]] || { echo "VERSION is empty for tag ref" >&2; exit 2; }
            FINAL_TAG="${VERSION}-${SUFFIX}"
          elif [[ "${BRANCH}" == "main" ]]; then
            [[ -n "${ALIAS}" ]] || { echo "matrix.tag.alias is required on main (TAG=${TAG})" >&2; exit 2; }
            FINAL_TAG="${ALIAS}"
          elif [[ "${BRANCH}" == maintenance-* ]]; then
            BRANCH_VERSION="${BRANCH#maintenance-}"
            [[ -n "${BRANCH_VERSION}" ]] || { echo "Invalid maintenance branch name: ${BRANCH}" >&2; exit 2; }
            FINAL_TAG="${BRANCH_VERSION}-${TAG}"
          else
            echo "No push policy for BRANCH=${BRANCH} REF_TYPE=${REF_TYPE}; build-only." >&2
          fi
          # Decide push behavior:
          # - Never push on PRs
          # - Push only when FINAL_TAG is present and Docker Hub credentials exist
          DO_PUSH="false"
          if [[ -n "${FINAL_TAG}" && "${GITHUB_EVENT_NAME}" != "pull_request" ]]; then
            [[ -n "${DOCKERHUB_USERNAME}" && -n "${DOCKERHUB_TOKEN}" ]] || { echo "Missing Docker Hub credentials (DOCKERHUB_USERNAME/DOCKERHUB_TOKEN)" >&2; exit 2; }
            DO_PUSH="true"
          fi
          # Build tags list (newline-delimited for docker/build-push-action).
          TAGS=()
          if [[ -n "${FINAL_TAG}" ]]; then
            TAGS+=("${IMAGE_NAME}:${FINAL_TAG}")
            [[ -n "${ALIAS2}" ]] && TAGS+=("${IMAGE_NAME}:${ALIAS2}")
          else
            # Deterministic local-only tag for build-only runs (no registry push).
            TAGS+=("${IMAGE_NAME}:ci-${GITHUB_SHA::12}")
          fi
          echo "Dockerfile=${DOCKERFILE_PATH}" >&2
          echo "Push=${DO_PUSH}" >&2
          echo "Tags:" >&2
          printf '  - %s\n' "${TAGS[@]}" >&2

          # echo "steps.docker_plan.outputs.version=${VERSION}"
          # echo "version=${VERSION}" >> $GITHUB_OUTPUT
          # echo "steps.docker_plan.outputs.tags=${TAGS}"
          # echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "steps.docker_plan.outputs.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          {
            echo "image_name=${IMAGE_NAME}"
            echo "dockerfile=${DOCKERFILE_PATH}"
            echo "push=${DO_PUSH}"
            echo "tags<<EOF"
            printf '%s\n' "${TAGS[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      ################################################################
      ## Docker build (multi-arch) — canonical Buildx workflow
      ################################################################
      - name: ⚙️ Set up QEMU (multi-arch emulation for docker buildx)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: 🧱 Set up Docker Buildx (for chartpress multi-arch builds)
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: 🔐 Login to Docker Hub
        # if: steps.docker_plan.outputs.push == 'true'
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        # if: steps.docker_plan.outputs.push == 'true'
        # continue-on-error: true
        with:
          # registry: ghcr.io  # Login to GitHub Container Registry
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # - name: 🔐 Login to GitHub Container Registry
      #   uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      #   # if: steps.docker_plan.outputs.push == 'true'
      #   # continue-on-error: true
      #   with:
      #     registry: ghcr.io  # Login to GitHub Container Registry
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build (multi-arch) and Push
        id: docker_build_release
        # timeout-minutes: 60
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ steps.docker_plan.outputs.dockerfile }}  # docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.docker_plan.outputs.push }}
          pull: true
          tags: ${{ steps.docker_plan.outputs.tags }}
          # Canonical cache backend for GitHub Actions runners, This isolates caches.
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}-${{ github.ref_name }}
          cache-from: type=gha,scope=${{ github.workflow }}-${{ github.ref_name }}
          labels: |
            org.opencontainers.image.source=${{ github.event.repository.html_url }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.docker_plan.outputs.created }}
          # load: true  # is for local daemon usability, not for multi-arch publishing.
          # Disable extra OCI attestations for maximum registry/tool compatibility
          # and stable digest expectations in multi-arch publishing.
          # provenance: false
          # sbom: false

      # scikitplot/scikit-plots:sha-${GITHUB_SHA::8} corresponds to the tag, which resolves to the index digest.
      # Index digest  — portable multi-platform reproducibility manifest list (what `docker pull` resolves).
      # Manifest digest — one exact platform reproducibility image; use only when targeting a single architecture (e.g. linux/amd64 on Binder).
      # - name: 🐳 Image index digest
      #   continue-on-error: true
      #   run: |
      #     # For multi-arch builds this is returns the index digest, not per-platform digest.
      #     # For multi-arch this is the manifest list / image index digest, not a single image digest.
      #     echo "Digest: ${{ steps.docker_build_release.outputs.digest }}"

      # scikitplot/scikit-plots:sha-<shortsha>
      #     -> Index Digest (multi-platform manifest list)
      #     -> chooses matching platform manifest (linux/amd64,linux/arm64)
      #     -> downloads that platform image
      - name: 🔎 Inspect pushed manifest
        # if: steps.docker_plan.outputs.push == 'true'
        continue-on-error: true
        run: |
          # docker images
          docker buildx imagetools inspect \
            scikitplot/scikit-plots:sha-${GITHUB_SHA::8}

      # docker pull scikitplot/scikit-plots:latest
      # docker run ... scikitplot/scikit-plots:sha-${GITHUB_SHA::8}
      # Because GitHub runners are usually amd64, but explicit is safer and deterministic.
      - name: 🧪 Smoke test published image check for curl and git
        # if: steps.docker_plan.outputs.push == 'true'
        continue-on-error: true
        run: |
          for i in {1..2}; do
            if docker run --rm \
              --platform linux/amd64 \
              --entrypoint /bin/bash \
              scikitplot/scikit-plots:sha-${GITHUB_SHA::8} \
              -c "uname -m && command -v curl && command -v git && git --version"; then
              # ends the script successfully.
              exit 0
            fi
            echo "Retrying in 10s... ($i/5)"
            sleep 10
          done
          echo "Smoke test failed after retries."
          # exit 1

      - name: 🧹 Cleanup (optional)
        if: always()
        continue-on-error: true
        run: |
          docker system prune -f
          echo "🔗 View at: https://hub.docker.com/u/${{ matrix.service[1] }}"
          echo "🔗 View at: https://hub.docker.com/r/${{ matrix.service[1] }}/${{ matrix.service[2] }}"

      ################################################################

      ## https://github.com/jupyterhub/binderhub/blob/main/.github/workflows/test-docker-build.yaml
      # - name: 📦 Build a multiple architecture Docker image
      #   run: |
      #     cd helm-chart
      #     chartpress \
      #         --builder docker-buildx \
      #         --platform linux/amd64 --platform linux/arm64


      ################################################################
      ## Docker Compose file (only host-native architecture)
      ################################################################
      ## Define the Docker Compose file path and service name
      ## ❗ Problem:
      ## docker compose build builds only for the current architecture (e.g. amd64 on Intel Mac/PC, or arm64 on M1/M2 Mac).
      ## Unfortunately, Docker Compose does not support multi-platform builds directly (as of 2025).
      # - name: 🔧 Build Docker image via Compose service
      #   # correctly filters for valid combinations
      #   if: contains( matrix.service[0], matrix.tag.tag )
      #   continue-on-error: true
      #   run: |
      #     set -euo pipefail

      #     ## docker ps -a --format '{{.Names}}'
      #     ## echo $(docker inspect --format='{{.Image}}' "scikit-plots_latest-jupyter")
      #     ## echo $(docker inspect --format='{{index .Config.Image}}' "scikit-plots_latest-jupyter")
      #     ##
      #     ## (Optionally) Save the Container as a New Image as service name (If Needed)
      #     ## This commits current container state, but it doesn't include volumes or changes outside the container filesystem.
      #     ## If container name is not unique, you might need to include container ID in the tag.
